<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Cartório Hub — Painel Gerencial</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root {
    --bg:        #0b0f1a;
    --surface:   #111827;
    --border:    #1e2d45;
    --accent:    #2dd4bf;
    --accent2:   #f59e0b;
    --danger:    #f87171;
    --success:   #34d399;
    --muted:     #64748b;
    --text:      #e2e8f0;
    --text-dim:  #94a3b8;
    --mono:      'DM Mono', monospace;
    --sans:      'Syne', sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    padding: 0 0 60px;
  }

  /* ── header ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 28px 40px 24px;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(180deg, #0d1525 0%, transparent 100%);
  }

  .logo-group { display: flex; align-items: center; gap: 14px; }

  .logo-icon {
    width: 42px; height: 42px;
    background: var(--accent);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
  }

  .logo-text { font-size: 1.3rem; font-weight: 800; letter-spacing: -0.02em; }
  .logo-text span { color: var(--accent); }

  .header-right { display: flex; align-items: center; gap: 16px; }

  #last-updated {
    font-family: var(--mono);
    font-size: .72rem;
    color: var(--muted);
  }

  .btn-refresh {
    background: var(--border);
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-family: var(--sans);
    font-size: .82rem;
    font-weight: 600;
    padding: 8px 18px;
    border-radius: 8px;
    cursor: pointer;
    transition: all .2s;
  }
  .btn-refresh:hover { background: var(--accent); color: #000; border-color: var(--accent); }

  /* ── layout ── */
  main { padding: 36px 40px; max-width: 1400px; margin: 0 auto; }

  /* ── kpi row ── */
  .kpi-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
    margin-bottom: 32px;
  }

  .kpi {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 24px 26px;
    position: relative;
    overflow: hidden;
    transition: transform .2s, box-shadow .2s;
  }
  .kpi:hover { transform: translateY(-3px); box-shadow: 0 12px 40px #0005; }

  .kpi::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: var(--accent-color, var(--accent));
    border-radius: 14px 14px 0 0;
  }

  .kpi.danger  { --accent-color: var(--danger); }
  .kpi.success { --accent-color: var(--success); }
  .kpi.warn    { --accent-color: var(--accent2); }

  .kpi-label {
    font-size: .72rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .1em;
    color: var(--muted);
    margin-bottom: 10px;
  }

  .kpi-value {
    font-size: 2.4rem;
    font-weight: 800;
    line-height: 1;
    letter-spacing: -0.04em;
    color: var(--accent-color, var(--accent));
  }

  .kpi-sub {
    font-family: var(--mono);
    font-size: .72rem;
    color: var(--muted);
    margin-top: 8px;
  }

  /* ── charts row ── */
  .charts-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-bottom: 28px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 26px 28px;
  }

  .card-title {
    font-size: .78rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .1em;
    color: var(--muted);
    margin-bottom: 20px;
  }

  .chart-wrap { position: relative; height: 240px; }

  /* ── top cartórios bar ── */
  .bar-list { display: flex; flex-direction: column; gap: 10px; }

  .bar-row { display: flex; align-items: center; gap: 12px; }

  .bar-label {
    font-family: var(--mono);
    font-size: .78rem;
    color: var(--text-dim);
    width: 72px;
    flex-shrink: 0;
  }

  .bar-track {
    flex: 1;
    height: 10px;
    background: var(--border);
    border-radius: 99px;
    overflow: hidden;
  }

  .bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), #38bdf8);
    border-radius: 99px;
    width: 0;
    transition: width .8s cubic-bezier(.4,0,.2,1);
  }

  .bar-count {
    font-family: var(--mono);
    font-size: .75rem;
    color: var(--muted);
    width: 28px;
    text-align: right;
    flex-shrink: 0;
  }

  /* ── error table ── */
  .full-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 26px 28px;
  }

  table { width: 100%; border-collapse: collapse; }

  thead th {
    font-size: .68rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .1em;
    color: var(--muted);
    text-align: left;
    padding-bottom: 14px;
    border-bottom: 1px solid var(--border);
  }

  tbody tr {
    border-bottom: 1px solid #1a2540;
    transition: background .15s;
  }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: #ffffff08; }

  tbody td {
    padding: 13px 0;
    font-size: .84rem;
    color: var(--text-dim);
    vertical-align: middle;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 3px 10px;
    border-radius: 99px;
    font-family: var(--mono);
    font-size: .7rem;
    font-weight: 500;
  }
  .badge.err  { background: #f8717120; color: var(--danger); }
  .badge.ok   { background: #34d39920; color: var(--success); }

  .mono { font-family: var(--mono); }

  /* ── empty / loading ── */
  .state-msg {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 120px;
    color: var(--muted);
    font-size: .85rem;
    gap: 8px;
  }

  .spinner {
    width: 22px; height: 22px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin .7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── fade-in ── */
  .fade-in { animation: fadeUp .45s ease both; }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── responsive ── */
  @media (max-width: 900px) {
    header { padding: 20px; }
    main   { padding: 20px; }
    .kpi-grid    { grid-template-columns: 1fr 1fr; }
    .charts-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <div class="logo-group">
    <div class="logo-icon">⚖️</div>
    <div class="logo-text">Cartório<span>Hub</span></div>
  </div>
  <div class="header-right">
    <span id="last-updated">—</span>
    <button class="btn-refresh" onclick="load()">↻ Atualizar</button>
  </div>
</header>

<main>
  <!-- KPIs -->
  <div class="kpi-grid fade-in">
    <div class="kpi">
      <div class="kpi-label">Total de Atos</div>
      <div class="kpi-value" id="kpi-total">—</div>
      <div class="kpi-sub">requisições recebidas</div>
    </div>
    <div class="kpi success">
      <div class="kpi-label">Integrados com Sucesso</div>
      <div class="kpi-value" id="kpi-sucesso">—</div>
      <div class="kpi-sub" id="kpi-taxa">—</div>
    </div>
    <div class="kpi danger">
      <div class="kpi-label">Erros de Integração</div>
      <div class="kpi-value" id="kpi-erro">—</div>
      <div class="kpi-sub">falhas na central</div>
    </div>
    <div class="kpi warn">
      <div class="kpi-label">Cartórios Ativos</div>
      <div class="kpi-value" id="kpi-cartorios">—</div>
      <div class="kpi-sub">com registros no hub</div>
    </div>
  </div>

  <!-- Charts -->
  <div class="charts-grid fade-in" style="animation-delay:.1s">
    <div class="card">
      <div class="card-title">Distribuição por Status</div>
      <div class="chart-wrap">
        <canvas id="chartStatus"></canvas>
      </div>
    </div>

    <div class="card">
      <div class="card-title">Volume por Tipo de Ato</div>
      <div class="chart-wrap">
        <canvas id="chartTipos"></canvas>
      </div>
    </div>
  </div>

  <!-- Bar + table row -->
  <div class="charts-grid fade-in" style="animation-delay:.2s">
    <div class="card">
      <div class="card-title">Top Cartórios por Volume</div>
      <div class="bar-list" id="bar-cartorios">
        <div class="state-msg"><div class="spinner"></div><span>Carregando...</span></div>
      </div>
    </div>

    <div class="full-card">
      <div class="card-title">Erros Recentes de Integração</div>
      <div id="table-erros">
        <div class="state-msg"><div class="spinner"></div><span>Carregando...</span></div>
      </div>
    </div>
  </div>
</main>

<script>
const API = 'http://localhost:8000/api/v1/dashboard/resumo';

let chartStatus = null;
let chartTipos  = null;

const PALETTE = [
  '#2dd4bf','#38bdf8','#818cf8','#f59e0b',
  '#f472b6','#34d399','#fb923c','#a78bfa',
];

function fmt(n) { return Number(n).toLocaleString('pt-BR'); }

async function load() {
  document.getElementById('last-updated').textContent = 'Atualizando...';

  try {
    const res  = await fetch(API);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    render(data);
  } catch(e) {
    document.getElementById('last-updated').textContent = '⚠ API indisponível';
    console.error(e);
  }
}

function render(d) {
  const t = d.totais;

  // KPIs
  document.getElementById('kpi-total').textContent    = fmt(t.geral);
  document.getElementById('kpi-sucesso').textContent  = fmt(t.sucesso);
  document.getElementById('kpi-erro').textContent     = fmt(t.erro);
  document.getElementById('kpi-taxa').textContent     = `taxa de sucesso: ${t.taxa_sucesso_pct}%`;
  document.getElementById('kpi-cartorios').textContent= fmt(d.top_cartorios.length);

  const ts = new Date(d.gerado_em).toLocaleString('pt-BR');
  document.getElementById('last-updated').textContent = `Atualizado: ${ts}`;

  // Donut — Status
  const ctxS = document.getElementById('chartStatus').getContext('2d');
  if (chartStatus) chartStatus.destroy();
  chartStatus = new Chart(ctxS, {
    type: 'doughnut',
    data: {
      labels: ['Sucesso', 'Erro'],
      datasets: [{
        data: [t.sucesso, t.erro],
        backgroundColor: ['#34d39940','#f8717140'],
        borderColor:     ['#34d399',  '#f87171'],
        borderWidth: 2,
        hoverOffset: 6,
      }]
    },
    options: {
      cutout: '72%',
      plugins: {
        legend: {
          position: 'bottom',
          labels: { color: '#94a3b8', font: { family: 'DM Mono', size: 11 }, padding: 16 }
        },
        tooltip: { callbacks: { label: ctx => ` ${ctx.label}: ${fmt(ctx.raw)}` } }
      }
    }
  });

  // Bar — Tipos de ato
  const tipos  = Object.keys(d.por_tipo_ato);
  const counts = Object.values(d.por_tipo_ato);
  const ctxT   = document.getElementById('chartTipos').getContext('2d');
  if (chartTipos) chartTipos.destroy();
  chartTipos = new Chart(ctxT, {
    type: 'bar',
    data: {
      labels: tipos,
      datasets: [{
        data: counts,
        backgroundColor: PALETTE.slice(0, tipos.length).map(c => c + '55'),
        borderColor:     PALETTE.slice(0, tipos.length),
        borderWidth: 2,
        borderRadius: 6,
      }]
    },
    options: {
      indexAxis: 'y',
      plugins: { legend: { display: false } },
      scales: {
        x: { ticks: { color: '#64748b', font: { family: 'DM Mono' } }, grid: { color: '#1e2d45' } },
        y: { ticks: { color: '#94a3b8', font: { family: 'DM Mono', size: 11 } }, grid: { display: false } }
      }
    }
  });

  // Barras horizontais — cartórios
  const maxV  = Math.max(...d.top_cartorios.map(c => c.total), 1);
  const barEl = document.getElementById('bar-cartorios');
  if (!d.top_cartorios.length) {
    barEl.innerHTML = '<div class="state-msg">Nenhum dado disponível.</div>';
  } else {
    barEl.innerHTML = d.top_cartorios.map(c => `
      <div class="bar-row">
        <span class="bar-label mono">${c.cartorio_id}</span>
        <div class="bar-track"><div class="bar-fill" data-pct="${c.total / maxV * 100}"></div></div>
        <span class="bar-count">${fmt(c.total)}</span>
      </div>`).join('');
    // animar barras
    requestAnimationFrame(() => {
      document.querySelectorAll('.bar-fill').forEach(el => {
        el.style.width = el.dataset.pct + '%';
      });
    });
  }

  // Tabela erros recentes
  const tblEl = document.getElementById('table-erros');
  if (!d.erros_recentes.length) {
    tblEl.innerHTML = '<div class="state-msg">✅ Nenhum erro recente registrado.</div>';
  } else {
    tblEl.innerHTML = `
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Cartório</th>
            <th>Tipo Ato</th>
            <th>Data/Hora</th>
            <th>Mensagem</th>
          </tr>
        </thead>
        <tbody>
          ${d.erros_recentes.map(e => `
            <tr>
              <td class="mono" style="color:var(--muted)">${e.id}</td>
              <td><span class="badge err">${e.cartorio_id}</span></td>
              <td class="mono">${e.tipo_ato}</td>
              <td class="mono" style="font-size:.75rem">${new Date(e.data_hora).toLocaleString('pt-BR')}</td>
              <td style="font-size:.78rem;max-width:260px;color:var(--danger)">${e.mensagem}</td>
            </tr>`).join('')}
        </tbody>
      </table>`;
  }
}

// carga inicial
load();
</script>
</body>
</html>
